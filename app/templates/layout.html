<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnScanner</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/dark.css">
    <link rel="stylesheet" href="/static/mobile.css">
    <script>
        function toggleDarkMode() {
            const body = document.body;
            const isDark = body.classList.toggle("dark-mode");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        }
        window.onload = () => {
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark-mode");
            }
        };
    </script>
</head>
<body>
    <header class="site-header">
        <div class="nav-wrap">
            <div class="brand">
                <div class="brand-mark">V</div>
                <div>
                    <div class="brand-title">VulnScanner</div>
                    <div class="brand-subtitle">Web Security Assessment Platform</div>
                </div>
            </div>
            <nav class="main-nav">
                <a href="/">Home</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/analytics">Analytics</a>
                <a href="/api-docs">API Docs</a>
                <a href="/admin">Admin</a>
                <a href="/login">Login</a>
                <button type="button" class="theme-toggle" onclick="toggleDarkMode()">Theme</button>
            </nav>
        </div>
    </header>
    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <div>
                <strong>VulnScanner</strong><br>
                Lightweight security scanning for websites and web apps.
            </div>
            <div class="footer-links">
                <a href="/api-docs">Documentation</a>
                <a href="/login">Account</a>
                <a href="/dashboard">Dashboard</a>
            </div>
        </div>
    </footer>
</body>
</html>
